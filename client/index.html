<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="REVOLVER — Premium Digital Marketing Agency. We amplify brands through strategic content, paid media, and creative production." />
    <meta name="theme-color" content="#080808" />
    <title>REVOLVER — Premium Digital Marketing Agency</title>

    <!-- DNS prefetch for external domains hit at runtime -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="dns-prefetch" href="https://firestore.googleapis.com" />
    <link rel="dns-prefetch" href="https://identitytoolkit.googleapis.com" />

    <!-- Preconnect to font servers (cuts ~100ms off font load) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Fonts: Graduate (display) + Inter (body) + Noto Sans Georgian (fallback) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Graduate&family=Inter:wght@300..900&family=Noto+Sans+Georgian:wght@100..900&family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Rubik:ital,wght@0,300..900;1,300..900&family=Young+Serif&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
